services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    hostname: vaultwarden
    restart: always
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:443/alive || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    env_file:
      - /opt/docker/vaultwarden/.env
    volumes:
      - /opt/docker/vaultwarden/data:/data
      - /opt/docker/vaultwarden/logs:/logs
    ports:
      - "9443:443" # Le reverse proxy se connectera à ce port en interne
      - "3012:3012" # Port WebSocket
    networks:
      - infrastructure_network
    mem_limit: 512m
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"
networks:
  infrastructure_network:
    external: true
